name: Sync OpenAPI Specs
on:
  workflow_dispatch:

jobs:
  update-from-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update API with Fern
        uses: fern-api/sync-openapi@v2
        with:
          update_from_source: true
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: 'update-api'
          auto_merge: false
